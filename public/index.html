<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>Purjehduskilpailu</title>
<style>
:root {
  --bg: #0a1628;
  --card: #111d33;
  --border: #1e3150;
  --text: #e0e8f0;
  --muted: #7a8da6;
  --accent: #3b82f6;
  --gold: #fbbf24;
  --silver: #94a3b8;
  --bronze: #d97706;
  --green: #22c55e;
  --red: #ef4444;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}

/* === HEADER === */
.header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:12px 16px;text-align:center;flex-shrink:0;
}
.header h1{font-size:1.1rem;color:var(--accent);margin-bottom:2px}
.header .sub{font-size:.75rem;color:var(--muted)}
.leader-bar{
  display:flex;justify-content:center;gap:16px;
  margin-top:6px;font-size:.8rem;color:var(--muted);
}
.leader-bar span{color:var(--text);font-weight:600}

/* === MAIN SCROLL === */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:12px}
.panel.active{display:block}

/* === BOTTOM NAV === */
.nav{
  display:flex;background:var(--card);border-top:1px solid var(--border);
  flex-shrink:0;padding-bottom:var(--safe-b);
}
.nav button{
  flex:1;padding:10px 4px 8px;background:none;border:none;
  color:var(--muted);font-size:.65rem;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;transition:color .15s;min-height:54px;
}
.nav button.active{color:var(--accent)}
.nav button svg{width:22px;height:22px}

/* === TABLES === */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th,td{padding:7px 6px;border:1px solid var(--border);text-align:center;white-space:nowrap}
th{background:var(--card);color:var(--muted);font-weight:600;position:sticky;top:0;z-index:2}
td{background:var(--bg)}
.sticky-col{position:sticky;left:0;z-index:1;background:var(--bg)}
th.sticky-col{z-index:3;background:var(--card)}

/* === RESULTS INPUT === */
.input-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin-bottom:12px;
}
.input-card h3{color:var(--accent);font-size:.95rem;margin-bottom:12px}
.race-sel{margin-bottom:16px}
.race-sel select{
  width:100%;padding:12px;font-size:1rem;border-radius:8px;
  background:var(--bg);color:var(--text);border:1px solid var(--border);
  font-family:inherit;
}
.boat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.boat-cell{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;
}
.boat-cell .boat-name{font-size:.75rem;color:var(--muted);margin-bottom:4px}
.boat-cell .sailor-name{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:10px}
.pos-row{display:flex;gap:6px}
.pos-btn{
  flex:1;height:48px;border-radius:8px;border:2px solid transparent;
  font-weight:700;font-size:1.1rem;font-family:inherit;cursor:pointer;
  transition:all .12s;
}
.pos-btn:active{transform:scale(.92)}
.pos-btn.sel{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}
.p1{background:var(--gold);color:#000}
.p2{background:var(--silver);color:#000}
.p3{background:var(--bronze);color:#fff}
.p4{background:var(--red);color:#fff}
.btn-row{display:flex;gap:8px}
.btn-save{
  flex:1;padding:14px;border:none;border-radius:10px;
  background:var(--accent);color:#fff;font-weight:700;
  font-size:1rem;font-family:inherit;cursor:pointer;
}
.btn-save:active{background:#2563eb}
.btn-save:disabled{opacity:.4}
.btn-clear{
  padding:14px 20px;border:none;border-radius:10px;
  background:var(--red);color:#fff;font-weight:700;
  font-size:1rem;font-family:inherit;cursor:pointer;
}
.btn-clear:active{background:#dc2626}

/* === SETTINGS (names) === */
.name-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.name-row label{
  width:28px;font-weight:700;color:var(--accent);font-size:1rem;flex-shrink:0;
}
.name-row input{
  flex:1;padding:12px;border-radius:8px;
  background:var(--bg);color:var(--text);border:1px solid var(--border);
  font-size:1rem;font-family:inherit;
}
.name-row input:focus{outline:2px solid var(--accent)}
.section-title{
  color:var(--accent);font-size:.95rem;font-weight:700;
  margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);
}
.section-title:first-child{margin-top:0}

/* Ranking colors */
.r1 .name-col{color:var(--gold)}
.r2 .name-col{color:var(--silver)}
.r3 .name-col{color:var(--bronze)}
.name-col{text-align:left;font-weight:700}
.pts{font-weight:700;color:var(--green);font-size:.9rem}
.dns{color:var(--border)}

/* Schedule cells */
.cell-sail{background:#1e3a5f;color:var(--accent);font-weight:600}
.cell-done{background:#14532d;color:var(--green);font-weight:600}
.cell-rest{color:#1e3150}
.hdr-done{background:#14532d!important;color:var(--green)!important}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--green);color:#000;padding:12px 24px;border-radius:10px;
  font-weight:700;font-size:.9rem;opacity:0;transition:all .3s;z-index:200;
  pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(min-width:640px){
  .boat-grid{grid-template-columns:repeat(4,1fr)}
  .panel{padding:16px 24px}
}
</style>
</head>
<body>

<div class="header">
  <h1>Purjehduskilpailu</h1>
  <div class="sub">10 purjehtijaa · 4 venettä · 20 kisaa</div>
  <div class="leader-bar">
    <div>Kisoja: <span id="hd-done">0</span>/20</div>
    <div>Johto: <span id="hd-leader">—</span></div>
  </div>
</div>

<div class="main">
  <div id="p-tulos" class="panel active"></div>
  <div id="p-syotto" class="panel"></div>
  <div id="p-aika" class="panel"></div>
  <div id="p-paiva" class="panel"></div>
  <div id="p-asetus" class="panel"></div>
</div>

<nav class="nav">
  <button class="active" data-p="p-tulos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    Tulokset
  </button>
  <button data-p="p-syotto">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    Syötä
  </button>
  <button data-p="p-aika">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Aikataulu
  </button>
  <button data-p="p-paiva">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
    Päivä
  </button>
  <button data-p="p-asetus">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Asetukset
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ===== STATE ===== */
let sailors = [];   // [{id,name}]
let boats = [];     // [{id,name}]
let schedule = [];  // [{1:'G',2:'J',...}]
let results = {};   // {0:{A:1,E:2,...}}

const SAILOR_IDS = ['A','B','C','D','E','F','G','H','I','J'];

/* ===== API ===== */
async function api(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}
async function loadAll() {
  [sailors, boats, schedule, results] = await Promise.all([
    api('/api/sailors'),
    api('/api/boats'),
    api('/api/schedule'),
    api('/api/results'),
  ]);
  renderAll();
}

function sName(id) {
  const s = sailors.find(s => s.id === id);
  return s ? s.name : id;
}
function bName(id) {
  const b = boats.find(b => b.id === parseInt(id));
  return b ? b.name : `Vene ${id}`;
}

/* ===== NAV ===== */
document.querySelectorAll('.nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.p).classList.add('active');
    renderAll();
  });
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ===== STANDINGS ===== */
function getStandings() {
  const pts = {}, rc = {}, rp = {};
  SAILOR_IDS.forEach(s => { pts[s]=0; rc[s]=0; rp[s]=[]; });

  for (let r = 0; r < 20; r++) {
    if (!results[r]) continue;
    const race = schedule[r];
    Object.entries(race).forEach(([boat, sid]) => {
      if (results[r] && results[r][sid] !== undefined) {
        pts[sid] += results[r][sid];
        rc[sid]++;
        rp[sid].push({race:r, pos:results[r][sid]});
      }
    });
  }

  const st = SAILOR_IDS.map(s => ({id:s, name:sName(s), pts:pts[s], races:rc[s], rp:rp[s]}));
  st.sort((a,b) => {
    if (!a.races && !b.races) return a.id.localeCompare(b.id);
    if (!a.races) return 1;
    if (!b.races) return -1;
    if (a.pts !== b.pts) return a.pts - b.pts;
    const a1 = a.rp.filter(r=>r.pos===1).length;
    const b1 = b.rp.filter(r=>r.pos===1).length;
    if (a1 !== b1) return b1 - a1;
    return a.id.localeCompare(b.id);
  });
  return st;
}

function racesDone() {
  let c = 0;
  for (let r = 0; r < 20; r++) if (results[r] && Object.keys(results[r]).length === 4) c++;
  return c;
}

/* ===== RENDER ===== */
function renderAll() {
  const done = racesDone();
  document.getElementById('hd-done').textContent = done;
  const st = getStandings();
  const ld = st.find(s => s.races > 0);
  document.getElementById('hd-leader').textContent = ld ? `${ld.name} (${ld.pts}p)` : '—';

  renderTulos(st);
  renderSyotto();
  renderAika();
  renderPaiva();
  renderAsetus();
}

/* --- Tulostaulu --- */
function renderTulos(st) {
  const el = document.getElementById('p-tulos');
  let h = '<div class="tbl-wrap"><table><tr><th class="sticky-col">#</th><th>Nimi</th><th>Pist.</th><th>Kisoja</th>';
  for (let r = 0; r < 20; r++) {
    const d = results[r] && Object.keys(results[r]).length === 4;
    h += `<th class="${d?'hdr-done':''}">${r+1}</th>`;
  }
  h += '</tr>';

  st.forEach((s, i) => {
    const rank = s.races > 0 ? i+1 : '—';
    const rc = rank <= 3 && s.races > 0 ? ` r${rank}` : '';
    h += `<tr class="${rc}"><td class="sticky-col">${rank}</td>`;
    h += `<td class="name-col">${s.name}</td>`;
    h += `<td class="pts">${s.races > 0 ? s.pts : '—'}</td>`;
    h += `<td>${s.races}</td>`;

    for (let r = 0; r < 20; r++) {
      const race = schedule[r];
      const inRace = Object.values(race).includes(s.id);
      if (!inRace) {
        h += '<td class="dns">·</td>';
      } else if (results[r] && results[r][s.id] !== undefined) {
        const p = results[r][s.id];
        const c = {1:'var(--gold)',2:'var(--silver)',3:'var(--bronze)',4:'var(--red)'}[p];
        h += `<td style="color:${c};font-weight:700">${p}</td>`;
      } else {
        h += '<td>—</td>';
      }
    }
    h += '</tr>';
  });
  h += '</table></div>';
  el.innerHTML = h;
}

/* --- Tulosten syöttö --- */
let curRace = -1;

function nextUndone() {
  for (let r = 0; r < 20; r++) {
    if (!results[r] || Object.keys(results[r]).length < 4) return r;
  }
  return 19;
}

function renderSyotto() {
  const el = document.getElementById('p-syotto');
  if (curRace < 0) curRace = nextUndone();

  let h = '<div class="input-card"><h3>Syötä kisatulokset</h3>';
  h += '<div class="race-sel"><select id="rsel" onchange="curRace=+this.value;renderSyotto()">';
  for (let r = 0; r < 20; r++) {
    const d = results[r] && Object.keys(results[r]).length === 4;
    h += `<option value="${r}" ${r===curRace?'selected':''}>Kisa ${r+1}${d?' ✓':''}</option>`;
  }
  h += '</select></div>';

  const race = schedule[curRace];
  const ex = results[curRace] || {};

  h += '<div class="boat-grid">';
  [1,2,3,4].forEach(b => {
    const sid = race[b];
    const cp = ex[sid];
    h += `<div class="boat-cell">`;
    h += `<div class="boat-name">${bName(b)}</div>`;
    h += `<div class="sailor-name">${sName(sid)}</div>`;
    h += '<div class="pos-row">';
    for (let p = 1; p <= 4; p++) {
      h += `<button class="pos-btn p${p}${cp===p?' sel':''}" onclick="setPos(${curRace},'${sid}',${p})">${p}</button>`;
    }
    h += '</div></div>';
  });
  h += '</div>';

  h += '<div class="btn-row">';
  h += `<button class="btn-save" onclick="saveRace(${curRace})">Tallenna kisa ${curRace+1}</button>`;
  h += `<button class="btn-clear" onclick="clearRace(${curRace})">Tyhjennä</button>`;
  h += '</div></div>';
  el.innerHTML = h;
}

function setPos(ri, sid, pos) {
  if (!results[ri]) results[ri] = {};
  // Remove duplicate position
  Object.keys(results[ri]).forEach(s => {
    if (results[ri][s] === pos && s !== sid) delete results[ri][s];
  });
  results[ri][sid] = pos;
  renderSyotto();
}

async function saveRace(ri) {
  const race = schedule[ri];
  const r = results[ri] || {};
  const sailors = Object.values(race);
  const assigned = sailors.filter(s => r[s] !== undefined);
  if (assigned.length < 4) { toast('Anna sijoitus kaikille!'); return; }
  const pv = assigned.map(s => r[s]).sort();
  if (JSON.stringify(pv) !== '[1,2,3,4]') { toast('Sijoitusten pitää olla 1-4!'); return; }

  await api(`/api/results/${ri}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(r),
  });
  toast(`Kisa ${ri+1} tallennettu!`);
  renderAll();
}

async function clearRace(ri) {
  delete results[ri];
  await api(`/api/results/${ri}`, { method: 'DELETE' });
  toast(`Kisa ${ri+1} tyhjennetty`);
  renderAll();
}

/* --- Aikataulu --- */
function renderAika() {
  const el = document.getElementById('p-aika');
  let h = '<div class="tbl-wrap"><table><tr><th>Kisa</th>';
  [1,2,3,4].forEach(b => h += `<th>${bName(b)}</th>`);
  h += '<th>Tauolla</th><th>Tila</th></tr>';

  for (let r = 0; r < 20; r++) {
    const race = schedule[r];
    const done = results[r] && Object.keys(results[r]).length === 4;
    const inR = Object.values(race);
    const rest = SAILOR_IDS.filter(s => !inR.includes(s)).map(sName).join(', ');
    h += `<tr><td style="font-weight:700">${r+1}</td>`;
    [1,2,3,4].forEach(b => h += `<td>${sName(race[b])}</td>`);
    h += `<td style="color:var(--muted);font-size:.72rem">${rest}</td>`;
    h += `<td>${done?'<span style="color:var(--green)">✓</span>':'—'}</td></tr>`;
  }
  h += '</table></div>';
  el.innerHTML = h;
}

/* --- Päiväohjelma --- */
function renderPaiva() {
  const el = document.getElementById('p-paiva');
  let h = '<div class="tbl-wrap"><table><tr><th class="sticky-col">Nimi</th>';
  for (let r = 0; r < 20; r++) {
    const d = results[r] && Object.keys(results[r]).length === 4;
    h += `<th class="${d?'hdr-done':''}">${r+1}</th>`;
  }
  h += '<th>Yht</th><th>Putki</th><th>Tauko</th></tr>';

  SAILOR_IDS.forEach(sid => {
    h += `<tr><td class="sticky-col name-col">${sName(sid)}</td>`;
    let streak=0,mxS=0,gap=0,mxG=0,cnt=0;
    for (let r = 0; r < 20; r++) {
      const race = schedule[r];
      const inR = Object.values(race).includes(sid);
      const done = results[r] && Object.keys(results[r]).length === 4;
      if (inR) {
        cnt++; streak++; mxS=Math.max(mxS,streak); gap=0;
        const boat = [1,2,3,4].find(b => race[b]===sid);
        h += `<td class="${done?'cell-done':'cell-sail'}">${bName(boat).substring(0,3)}</td>`;
      } else {
        gap++; mxG=Math.max(mxG,gap); streak=0;
        h += '<td class="cell-rest">·</td>';
      }
    }
    h += `<td>${cnt}</td><td>${mxS}</td><td>${mxG}</td></tr>`;
  });
  h += '</table></div>';
  el.innerHTML = h;
}

/* --- Asetukset --- */
function renderAsetus() {
  const el = document.getElementById('p-asetus');
  let h = '<div class="section-title">Purjehtijoiden nimet</div>';
  sailors.forEach(s => {
    h += `<div class="name-row"><label>${s.id}</label>`;
    h += `<input type="text" value="${esc(s.name)}" data-sid="${s.id}" class="sailor-inp" maxlength="20"></div>`;
  });
  h += `<button class="btn-save" style="width:100%;margin-top:8px" onclick="saveSailors()">Tallenna nimet</button>`;

  h += '<div class="section-title">Veneiden nimet</div>';
  boats.forEach(b => {
    h += `<div class="name-row"><label>${b.id}</label>`;
    h += `<input type="text" value="${esc(b.name)}" data-bid="${b.id}" class="boat-inp" maxlength="20"></div>`;
  });
  h += `<button class="btn-save" style="width:100%;margin-top:8px" onclick="saveBoats()">Tallenna veneet</button>`;

  el.innerHTML = h;
}

function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

async function saveSailors() {
  const inps = document.querySelectorAll('.sailor-inp');
  const data = [];
  inps.forEach(inp => {
    const id = inp.dataset.sid;
    const name = inp.value.trim() || id;
    data.push({id, name});
  });
  await api('/api/sailors', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data),
  });
  sailors = data;
  toast('Nimet tallennettu!');
  renderAll();
}

async function saveBoats() {
  const inps = document.querySelectorAll('.boat-inp');
  const data = [];
  inps.forEach(inp => {
    const id = parseInt(inp.dataset.bid);
    const name = inp.value.trim() || `Vene ${id}`;
    data.push({id, name});
  });
  await api('/api/boats', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data),
  });
  boats = data;
  toast('Veneet tallennettu!');
  renderAll();
}

/* ===== INIT ===== */
loadAll();
</script>
</body>
</html>
